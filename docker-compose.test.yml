services:
  verify-sounds-tests:
    image: ragedunicorn/python:3.14.6-alpine3.24.1-1
    volumes:
      - ./tools/verify_sounds:/app
      - ./target:/target
    working_dir: /app
    entrypoint: [ ]
    command:
      - sh
      - -c
      - |
        pip install -r requirements.txt &&
        mkdir -p /target/test_results/verify_sounds &&
        python -m pytest tests/ \
          --verbose \
          --tb=short \
          --junit-xml=/target/test_results/verify_sounds/junit.xml

  voice-generator-tests:
    image: ragedunicorn/python:3.14.6-alpine3.24.1-1
    volumes:
      - ./tools/voice_generator:/app
      - ./target:/target
    working_dir: /app
    entrypoint: [ ]
    command:
      - sh
      - -c
      - |
        pip install -r requirements.txt &&
        mkdir -p /target/test_results/voice_generator &&
        python -m pytest tests/ \
          --verbose \
          --tb=short \
          --junit-xml=/target/test_results/voice_generator/junit.xml

  verify-spellmap-tests:
    image: ragedunicorn/python:3.14.6-alpine3.24.1-1
    volumes:
      - ./tools/verify_spellmap:/app
      - ./target:/target
    working_dir: /app
    entrypoint: [ ]
    command:
      - sh
      - -c
      - |
        pip install -r requirements.txt &&
        mkdir -p /target/test_results/verify_spellmap &&
        python -m pytest tests/ \
          --verbose \
          --tb=short \
          --cov=verify_spellmap \
          --cov-report=html:/target/test_results/verify_spellmap/coverage_html \
          --cov-report=xml:/target/test_results/verify_spellmap/coverage.xml \
          --junit-xml=/target/test_results/verify_spellmap/junit.xml
